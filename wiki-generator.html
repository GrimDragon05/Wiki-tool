<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curse of Aros — Wiki Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c18;
  --panel: #13131f;
  --panel2: #0f0f1c;
  --border: #252540;
  --gold: #c9a84c;
  --gold-light: #e8c96e;
  --gold-dim: #6a5220;
  --gold-bg: rgba(201,168,76,0.08);
  --text: #cccce0;
  --text-dim: #7070a0;
  --red: #e05555;
  --green: #55b055;
  --blue: #5588e0;
  --code-bg: #090912;
  --r: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; font-size: 13.5px; overflow: hidden; }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #0a0a18 0%, #161028 60%, #0a0a18 100%);
  border-bottom: 1px solid var(--gold-dim);
  padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-icon { font-size: 26px; filter: drop-shadow(0 0 10px rgba(201,168,76,0.5)); }
.header h1 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 18px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(201,168,76,0.35); }
.header .sub { color: var(--text-dim); font-size: 10px; letter-spacing: 2px; margin-top: 2px; text-transform: uppercase; }

/* ── TABS ── */
.tab-bar { display: flex; padding: 0 28px; background: var(--panel2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { padding: 9px 22px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-family: 'Cinzel', serif; font-size: 11.5px; letter-spacing: 1.5px; border-bottom: 2px solid transparent; transition: all 0.2s; margin-right: 4px; }
.tab:hover { color: var(--gold-light); }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── LAYOUT ── */
.layout { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 90px); overflow: hidden; }
.form-panel { overflow-y: auto; padding: 20px 24px 40px; border-right: 1px solid var(--border); }
.output-panel { display: flex; flex-direction: column; background: var(--code-bg); overflow: hidden; }
.output-header { padding: 10px 18px; background: #0f0f1e; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.output-header span { font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 2px; }
.output-code { flex: 1; padding: 18px 20px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.75; color: #c9d1d9; white-space: pre-wrap; word-break: break-word; }

/* ── FORM SECTIONS ── */
.fsec { margin-bottom: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.fsec-head { background: var(--panel2); padding: 9px 14px; font-family: 'Cinzel', serif; font-size: 11px; color: var(--gold); letter-spacing: 1.8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.fsec-body { padding: 14px 14px; }

/* ── FIELDS ── */
.frow { display: grid; grid-template-columns: 120px 1fr; align-items: start; gap: 8px; margin-bottom: 10px; }
.frow:last-child { margin-bottom: 0; }
.frow label { color: var(--text-dim); font-size: 12px; padding-top: 8px; text-align: right; }
input[type=text], input[type=number], textarea, select {
  background: var(--panel2); border: 1px solid var(--border); border-radius: 5px;
  color: var(--text); padding: 7px 10px; font-family: 'Nunito', sans-serif; font-size: 13px;
  width: 100%; transition: border-color 0.18s;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--gold-dim); box-shadow: 0 0 0 2px rgba(201,168,76,0.08); }
textarea { resize: vertical; min-height: 60px; }
select option { background: #0d0d1a; }
input[type=number] { -moz-appearance: textfield; }

/* ── BUTTONS ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border: 1px solid; border-radius: 5px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 600; transition: all 0.16s; letter-spacing: 0.3px; }
.btn-gold { background: rgba(106,82,32,0.3); color: var(--gold-light); border-color: var(--gold-dim); }
.btn-gold:hover { background: var(--gold-dim); color: #fff8e0; }
.btn-red { background: rgba(80,20,20,0.5); color: var(--red); border-color: rgba(200,50,50,0.3); padding: 5px 8px; }
.btn-red:hover { background: rgba(100,20,20,0.8); }
.btn-ghost { background: transparent; color: var(--text-dim); border-color: var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }
.btn-copy { background: rgba(40,40,60,0.8); color: var(--gold-light); border-color: var(--gold-dim); padding: 6px 18px; font-size: 12px; }
.btn-copy:hover { background: var(--gold-dim); color: #fff; }
.btn-copy.copied { background: rgba(20,60,20,0.8); color: var(--green); border-color: #2a5a2a; }
.full-btn { width: 100%; justify-content: center; margin-top: 8px; }

/* ── DYNAMIC ITEMS ── */
.dyn-item { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
.dyn-item input { flex: 1; }
.drop-row { display: grid; grid-template-columns: 1fr 70px 110px 32px; gap: 6px; margin-bottom: 7px; align-items: center; }
.alch-row { display: grid; grid-template-columns: 1fr 100px 70px 32px; gap: 6px; margin-bottom: 7px; align-items: center; }

/* ── SECTION CARDS ── */
.sec-card { background: var(--panel2); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; overflow: hidden; }
.sec-card-head { background: #0a0a14; padding: 8px 10px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.sec-card-head input { flex: 1; min-width: 120px; background: transparent; border: none; font-size: 13px; color: var(--text); }
.sec-card-head input:focus { outline: none; }
.sec-card-head select { width: auto; padding: 4px 8px; font-size: 12px; }
.sec-card-body { padding: 12px; }
.table-headers { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.table-headers .hdr-item { display: flex; gap: 4px; align-items: center; }
.table-headers input { width: 100px; font-size: 12px; padding: 5px 7px; }
.table-row-line { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; }
.table-row-line input { flex: 1; min-width: 55px; font-size: 12px; padding: 5px 7px; }
.list-item-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.list-item-row input { flex: 1; }
.link-row { display: flex; gap: 7px; margin-bottom: 7px; align-items: center; }
.link-row input { flex: 1; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

/* ── HELPERS ── */
.hint { color: var(--text-dim); font-size: 11.5px; margin-bottom: 10px; line-height: 1.5; }
.col-headers-row { display: flex; gap: 6px; margin-bottom: 2px; padding-right: 32px; }
.col-headers-row span { flex: 1; font-size: 10.5px; color: var(--text-dim); padding-left: 2px; }
.col-headers-row .col-qty { width: 70px; flex: none; }
.col-headers-row .col-rar { width: 110px; flex: none; }
.col-headers-row .col-lvl { width: 100px; flex: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-icon">⚔</div>
    <div>
      <div class="header h1">CURSE OF AROS</div>
      <div class="sub">Wiki Template Generator</div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('item')">📦 Item Page</button>
  <button class="tab" onclick="switchTab('monster')">👹 Monster Page</button>
</div>

<div class="layout">
  <div class="form-panel" id="form-panel"></div>
  <div class="output-panel">
    <div class="output-header">
      <span>📋 WIKI CODE OUTPUT</span>
      <button class="btn btn-copy" id="copy-btn" onclick="copyCode()">Copy to Clipboard</button>
    </div>
    <div class="output-code" id="output-code"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
let currentTab = 'item';

const itemState = {
  name:'', image:'', description:'', obtained:'', buy:'', sell:'',
  pageDescription:'', categories:[], sections:[], linkWords:[]
};
const monsterState = {
  name:'', image:'', level:'', hp:'', xp:'', gold:'', speed:'',
  damage:'', respawn:'', found:'', date:'', pageDescription:'',
  drops:[], alchemyDrops:[], tertiaryDrops:[],
  sections:[], categories:[], linkWords:[]
};

function getState() { return currentTab === 'item' ? itemState : monsterState; }

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
function e(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function frow(lbl, inp) {
  return `<div class="frow"><label>${lbl}</label><div>${inp}</div></div>`;
}
function fsec(title, body) {
  return `<div class="fsec"><div class="fsec-head">${title}</div><div class="fsec-body">${body}</div></div>`;
}
function inp(id, val, ph, type='text') {
  return `<input type="${type}" id="${id}" value="${e(val)}" placeholder="${e(ph)}">`;
}
function ta(id, val, ph) {
  return `<textarea id="${id}" placeholder="${e(ph)}">${e(val)}</textarea>`;
}

// ═══════════════════════════════════════════════
//  SWITCH TAB
// ═══════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>
    t.classList.toggle('active',(i===0&&tab==='item')||(i===1&&tab==='monster')));
  renderForm(); generateOutput();
}

// ═══════════════════════════════════════════════
//  RENDER FORM
// ═══════════════════════════════════════════════
function renderForm() {
  document.getElementById('form-panel').innerHTML =
    currentTab === 'item' ? renderItemForm() : renderMonsterForm();
  bindBaseFields();
}

function renderItemForm() {
  const s = itemState;
  return `
    ${fsec('📦 ITEM BOX', `
      ${frow('Item Name',   inp('f-name',  s.name,  'Health Potion'))}
      ${frow('Image File',  inp('f-image', s.image, 'Health_potion_m.png'))}
      ${frow('Description', ta('f-description', s.description, 'A bitter, red liquid. Restores 30 health.'))}
      ${frow('Obtained',    inp('f-obtained', s.obtained, 'Dropped by almost every monster.'))}
      ${frow('Buy Price',   inp('f-buy',  s.buy,  '100', 'number'))}
      ${frow('Sell Price',  inp('f-sell', s.sell, '35',  'number'))}
    `)}
    ${fsec('📝 PAGE DESCRIPTION',`
      ${frow('Body Text', ta('f-pageDescription', s.pageDescription, 'A potion is an item that can be consumed to replenish...'))}
    `)}
    ${renderCategoriesSection()}
    ${renderSectionsSection()}
    ${renderLinkWordsSection()}
  `;
}

function renderMonsterForm() {
  const s = monsterState;
  return `
    ${fsec('👹 MONSTER BOX', `
      ${frow('Monster Name', inp('f-name',    s.name,    'Bat'))}
      ${frow('Image File',   inp('f-image',   s.image,   'Bat_m.gif'))}
      ${frow('Level',        inp('f-level',   s.level,   '1',  'number'))}
      ${frow('HP',           inp('f-hp',      s.hp,      '45', 'number'))}
      ${frow('XP',           inp('f-xp',      s.xp,      '8',  'number'))}
      ${frow('Gold',         inp('f-gold',    s.gold,    '1',  'number'))}
      ${frow('Speed',        inp('f-speed',   s.speed,   '2',  'number'))}
      ${frow('Damage',       inp('f-damage',  s.damage,  '10', 'number'))}
      ${frow('Respawn',      inp('f-respawn', s.respawn, '2',  'number'))}
      ${frow('Found In',     inp('f-found',   s.found,   'In Brightleaf'))}
      ${frow('Date Added',   inp('f-date',    s.date,    '19th November, 2018'))}
    `)}
    ${fsec('📝 PAGE DESCRIPTION',`
      ${frow('Body Text', ta('f-pageDescription', s.pageDescription, 'Found in the Starting town of Brightleaf...'))}
    `)}
    ${renderDropsSection('drops', '⚔️ DROP TABLE')}
    ${renderAlchemySection()}
    ${renderDropsSection('tertiaryDrops', '🍬 TERTIARY DROPS', 'Extra item roll — rare drop from all near-level monsters.')}
    ${renderSectionsSection()}
    ${renderCategoriesSection()}
    ${renderLinkWordsSection()}
  `;
}

// ─── Drops ────────────────────────────────────
function renderDropsSection(key, title, hint='') {
  const drops = getState()[key] || [];
  return fsec(title, `
    ${hint ? `<p class="hint">${hint}</p>` : ''}
    <div class="col-headers-row">
      <span>Item Name</span><span class="col-qty">Qty</span><span class="col-rar">Rarity</span>
    </div>
    <div id="${key}-list">
      ${drops.map((d,i)=>renderDropRow(d,i,key)).join('')}
    </div>
    <button class="btn btn-gold full-btn" onclick="addDrop('${key}')">+ Add Drop</button>
  `);
}

function renderDropRow(d,i,key) {
  const rarities = ['Common','Uncommon','Rare','Very Rare','Ultra Rare'];
  return `<div class="drop-row">
    <input type="text" value="${e(d.name)}" oninput="updateDrop('${key}',${i},'name',this.value)" placeholder="Item name">
    <input type="number" value="${e(d.quantity)}" oninput="updateDrop('${key}',${i},'quantity',this.value)" placeholder="1">
    <select onchange="updateDrop('${key}',${i},'rarity',this.value)">
      ${rarities.map(r=>`<option value="${r}"${d.rarity===r?' selected':''}>${r}</option>`).join('')}
    </select>
    <button class="btn btn-red" onclick="removeDrop('${key}',${i})">✕</button>
  </div>`;
}

// ─── Alchemy ──────────────────────────────────
function renderAlchemySection() {
  const drops = monsterState.alchemyDrops || [];
  return fsec('⚗️ ALCHEMY DROP TABLE', `
    <p class="hint">Drops after reaching the required Alchemy level.</p>
    <div class="col-headers-row">
      <span>Item Name</span><span class="col-lvl">Alchemy Level</span><span class="col-qty">Qty</span>
    </div>
    <div id="alchemyDrops-list">
      ${drops.map((d,i)=>`
        <div class="alch-row">
          <input type="text" value="${e(d.name)}" oninput="updateAlchemy(${i},'name',this.value)" placeholder="Item name">
          <input type="number" value="${e(d.level)}" oninput="updateAlchemy(${i},'level',this.value)" placeholder="Level req">
          <input type="number" value="${e(d.quantity)}" oninput="updateAlchemy(${i},'quantity',this.value)" placeholder="Qty">
          <button class="btn btn-red" onclick="removeAlchemy(${i})">✕</button>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-gold full-btn" onclick="addAlchemy()">+ Add Alchemy Drop</button>
  `);
}

// ─── Sections ─────────────────────────────────
function renderSectionsSection() {
  const sections = getState().sections || [];
  return fsec('➕ CUSTOM SECTIONS', `
    <div id="sections-list">
      ${sections.map((sec,i)=>renderSecCard(sec,i)).join('')}
    </div>
    <button class="btn btn-gold full-btn" onclick="addSection()">+ Add Section</button>
  `);
}

function renderSecCard(sec,i) {
  const lvlOpts = ['1','2','3'].map(l=>`<option value="${l}"${sec.level===l?' selected':''}>${'='.repeat(l)} H${l}</option>`).join('');
  return `<div class="sec-card">
    <div class="sec-card-head">
      <input type="text" value="${e(sec.title)}" oninput="updateSec(${i},'title',this.value)" placeholder="Section title e.g. Dropped by">
      <select onchange="updateSec(${i},'type',this.value)">
        <option value="list"${sec.type==='list'?' selected':''}>📋 List</option>
        <option value="table"${sec.type==='table'?' selected':''}>📊 Table</option>
        <option value="text"${sec.type==='text'?' selected':''}>📄 Plain Text</option>
      </select>
      <select onchange="updateSec(${i},'level',this.value)" style="width:80px">${lvlOpts}</select>
      <button class="btn btn-red" onclick="removeSec(${i})">✕</button>
    </div>
    <div class="sec-card-body">
      ${sec.type==='list'  ? renderListEditor(sec,i)  : ''}
      ${sec.type==='table' ? renderTableEditor(sec,i) : ''}
      ${sec.type==='text'  ? renderTextEditor(sec,i)  : ''}
    </div>
  </div>`;
}

function renderListEditor(sec,i) {
  return `
    <input type="text" value="${e(sec.requiresNote||'')}" oninput="updateSec(${i},'requiresNote',this.value)"
      placeholder="Optional note line e.g. Requires 1 Alchemy" style="width:100%;margin-bottom:8px">
    <div id="sec-items-${i}">
      ${(sec.items||[]).map((item,j)=>`
        <div class="list-item-row">
          <input type="text" value="${e(item)}" oninput="updateSecItem(${i},${j},this.value)" placeholder="* x1 {{Item|BrightRose}} or * [[Bat]] (Level 1)">
          <button class="btn btn-red" onclick="removeSecItem(${i},${j})">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn btn-ghost" onclick="addSecItem(${i})" style="font-size:12px;padding:5px 12px">+ Add Item</button>
  `;
}

function renderTableEditor(sec,i) {
  const headers = sec.headers || [];
  const rows = sec.rows || [];
  return `
    <div style="margin-bottom:10px">
      <p class="hint">Add column headers, then add rows.</p>
      <div class="table-headers" id="tbl-hdrs-${i}">
        ${headers.map((h,j)=>`
          <div class="hdr-item">
            <input type="text" value="${e(h)}" oninput="updateTblHdr(${i},${j},this.value)" placeholder="Header">
            <button class="btn btn-red" onclick="removeTblHdr(${i},${j})" style="padding:4px 6px;font-size:11px">✕</button>
          </div>`).join('')}
        <button class="btn btn-ghost" onclick="addTblHdr(${i})" style="font-size:11px;padding:4px 9px">+ Col</button>
      </div>
    </div>
    <div id="tbl-rows-${i}">
      ${rows.map((row,j)=>`
        <div class="table-row-line">
          ${headers.map((_,k)=>`<input type="text" value="${e(row[k]||'')}" oninput="updateTblCell(${i},${j},${k},this.value)" placeholder="${e(headers[k]||'Cell')}">`).join('')}
          <button class="btn btn-red" onclick="removeTblRow(${i},${j})" style="padding:4px 6px;font-size:11px;flex-shrink:0">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn btn-ghost" onclick="addTblRow(${i})" style="font-size:12px;padding:5px 12px;margin-top:4px">+ Add Row</button>
  `;
}

function renderTextEditor(sec,i) {
  return `<textarea oninput="updateSec(${i},'content',this.value)" placeholder="Enter plain text content..." style="width:100%;min-height:70px">${e(sec.content||'')}</textarea>`;
}

// ─── Categories ───────────────────────────────
function renderCategoriesSection() {
  const cats = getState().categories || [];
  return fsec('🏷️ CATEGORIES', `
    <div id="categories-list">
      ${cats.map((c,i)=>`
        <div class="dyn-item">
          <input type="text" value="${e(c)}" oninput="updateCat(${i},this.value)" placeholder="e.g. Consumables">
          <button class="btn btn-red" onclick="removeCat(${i})">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn btn-gold full-btn" onclick="addCat()">+ Add Category</button>
  `);
}

// ─── Link Words ───────────────────────────────
function renderLinkWordsSection() {
  const words = getState().linkWords || [];
  return fsec('🔗 AUTO-LINK WORDS', `
    <p class="hint">Any word/phrase entered here will be automatically turned into a [[wiki link]] in the output text.</p>
    <div id="linkwords-list">
      ${words.map((w,i)=>`
        <div class="link-row">
          <input type="text" value="${e(w)}" oninput="updateLink(${i},this.value)" placeholder="e.g. Brightleaf or Bat Eye">
          <button class="btn btn-red" onclick="removeLink(${i})">✕</button>
        </div>`).join('')}
    </div>
    <button class="btn btn-ghost full-btn" onclick="addLink()">+ Add Link Word</button>
  `);
}

// ═══════════════════════════════════════════════
//  BIND BASE FIELD LISTENERS
// ═══════════════════════════════════════════════
function bindBaseFields() {
  const map = {
    'f-name':'name','f-image':'image','f-description':'description',
    'f-obtained':'obtained','f-buy':'buy','f-sell':'sell',
    'f-pageDescription':'pageDescription','f-level':'level','f-hp':'hp',
    'f-xp':'xp','f-gold':'gold','f-speed':'speed','f-damage':'damage',
    'f-respawn':'respawn','f-found':'found','f-date':'date'
  };
  for (const [id,key] of Object.entries(map)) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', ()=>{ getState()[key]=el.value; generateOutput(); });
  }
}

// ═══════════════════════════════════════════════
//  STATE MUTATIONS
// ═══════════════════════════════════════════════
// -- Drops
function addDrop(key)         { getState()[key].push({name:'',quantity:1,rarity:'Common'}); renderForm(); generateOutput(); }
function updateDrop(k,i,f,v) { getState()[k][i][f]=v; generateOutput(); }
function removeDrop(k,i)      { getState()[k].splice(i,1); renderForm(); generateOutput(); }

// -- Alchemy
function addAlchemy()       { monsterState.alchemyDrops.push({name:'',level:1,quantity:1}); renderForm(); generateOutput(); }
function updateAlchemy(i,f,v){ monsterState.alchemyDrops[i][f]=v; generateOutput(); }
function removeAlchemy(i)   { monsterState.alchemyDrops.splice(i,1); renderForm(); generateOutput(); }

// -- Sections
function addSection() {
  getState().sections.push({title:'',type:'list',level:'2',items:[],headers:[],rows:[],content:'',requiresNote:''});
  renderForm(); generateOutput();
}
function updateSec(i,f,v) {
  getState().sections[i][f]=v;
  if(f==='type') renderForm();

function removeSec(i)   { getState().sections.splice(i,1); renderForm(); generateOutput(); }

function updateSecItem(si,j,v){ getState().sections[si].items[j]=v; generateOutput(); }
function removeSecItem(si,j)  { getState().sections[si].items.splice(j,1); renderForm(); generateOutput(); }

function addTblHdr(si) {

  getState().sections[si].rows.forEach(r=>r.push(''));

}
function updateTblHdr(si,j,v){ getState().sections[si].headers[j]=v; generateOutput(); }
function removeTblHdr(si,j)  {
  getState().sections[si].headers.splice(j,1);
  getState().sections[si].rows.forEach(r=>r.splice(j,1));
  renderForm(); generateOutput();

function addTblRow(si)          { getState().sections[si].rows.push(getState().sections[si].headers.map(()=>'')); renderForm(); generateOutput(); }
function updateTblCell(si,ri,ci,v){ getState().sections[si].rows[ri][ci]=v; generateOutput(); }
function removeTblRow(si,ri)     { getState().sections[si].rows.splice(ri,1); renderForm(); generateOutput(); }

// -- Categories
function addCat()       { getState().categories.push(''); renderForm(); generateOutput(); }
function updateCat(i,v) { getState().categories[i]=v; generateOutput(); }
function removeCat(i)   { getState().categories.splice(i,1); renderForm(); generateOutput(); }

// -- Link words
function addLink()       { getState().linkWords.push(''); renderForm(); generateOutput(); }
function updateLink(i,v) { getState().linkWords[i]=v; generateOutput(); }
function removeLink(i)   { getState().linkWords.splice(i,1); renderForm(); generateOutput(); }

// ═══════════════════════════════════════════════
//  OUTPUT GENERATION
// ═══════════════════════════════════════════════
function wikiLink(text, words) {
  if (!words.length) return text;
  let result = text;
  // Sort by length desc so longer phrases match first
  const sorted = [...words].filter(w=>w.trim()).sort((a,b)=>b.length-a.length);
  for (const w of sorted) {
    const esc2 = w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    // Replace bare occurrences not already inside [[ ]]
    result = result.replace(new RegExp(`(?<!\\[\\[)(?<![|\\w])${esc2}(?!\\]\\])(?![\\w|])`, 'g'), `[[${w}]]`);
  }
  return result;
}

function hdr(n, title) {
  const eq = '='.repeat(parseInt(n)||2);
  return `${eq} ${title} ${eq}`;
}

function generateOutput() {
  const s = getState();
  const links = (s.linkWords||[]).filter(w=>w.trim());
  let out = '';

  if (currentTab === 'item') {
    out += `{{#invoke: ItemBox|show\n`;
    if (s.name)        out += `|name=${s.name}\n`;
    if (s.image)       out += `|image=${s.image}\n`;
    if (s.description) out += `|description=${s.description}\n`;
    if (s.obtained)    out += `|obtained=${s.obtained}\n`;
    if (s.buy)         out += `|buy=${s.buy}\n`;
    if (s.sell)        out += `|sell=${s.sell}\n`;
    out += `}}\n`;
    if (s.pageDescription) out += `\n${wikiLink(s.pageDescription, links)}\n`;

  } else {
    out += `{{#invoke: MonsterBox|show\n`;
    if (s.name)    out += `|name=${s.name}\n`;
    if (s.image)   out += `|image=${s.image}\n`;
    if (s.level)   out += `|level=${s.level}\n`;
    if (s.hp)      out += `|hp=${s.hp}\n`;
    if (s.xp)      out += `|xp=${s.xp}\n`;
    if (s.gold)    out += `|gold=${s.gold}\n`;
    if (s.speed)   out += `|speed=${s.speed}\n`;
    if (s.damage)  out += `|damage=${s.damage}\n`;
    if (s.respawn) out += `|respawn=${s.respawn}\n`;
    if (s.found)   out += `|found=${wikiLink(s.found, links)}\n`;
    if (s.date)    out += `|date=${s.date}\n`;
    out += `}}\n`;
    if (s.pageDescription) out += `\n${wikiLink(s.pageDescription, links)}\n`;

    // Drop table
    const drops = (s.drops||[]).filter(d=>d.name);
    if (drops.length) {
      out += `\n= Drop Table =\n{{DropsStart}}\n`;
      drops.forEach(d=>{ out += `{{Drop|Name=${d.name}|Quantity=${d.quantity||1}|Rarity=${d.rarity||'Common'}}}\n`; });
      out += `{{DropsEnd}}\n`;
    }

    // Alchemy
    const alch = (s.alchemyDrops||[]).filter(d=>d.name);
    if (alch.length) {
      out += `\n== Alchemy drop table ==\nDrops after reaching the required Alchemy level.\n`;
      out += `{| class="wikitable"\n|-\n! Item!! Alchemy level !! Quantity \n`;
      alch.forEach(d=>{ out += `|-\n| {{#invoke: Item|show|name=${d.name}}} || ${d.level||1} || ${d.quantity||1}\n`; });
      out += `|}\n`;
    }

    // Tertiary
    const tert = (s.tertiaryDrops||[]).filter(d=>d.name);
    if (tert.length) {
      out += `\n= Tertiary Drop =\nThis can be obtained as an extra item roll rarely from all monsters. They will only drop if the monster is near your level (bosses not included)\n\n{{DropsStart}}\n`;
      tert.forEach(d=>{ out += `{{Drop|Name=${d.name}|Quantity=${d.quantity||1}|Rarity=${d.rarity||'Rare'}}}\n`; });
      out += `{{DropsEnd}}\n`;
    }
  }

  // Custom sections
  for (const sec of (s.sections||[])) {
    out += `\n${hdr(sec.level||'2', sec.title||'Section')}\n`;

    if (sec.type === 'list') {
      if (sec.requiresNote) out += `*${sec.requiresNote}\n`;
      (sec.items||[]).filter(x=>x).forEach(item=>{ out += `${wikiLink(item, links)}\n`; });

    } else if (sec.type === 'table') {
      const hdrs = sec.headers||[];
      const rows = sec.rows||[];
      if (hdrs.length || rows.length) {
        out += `{| class="wikitable"\n|-\n`;
        if (hdrs.length) out += `! ${hdrs.join('!! ')}\n`;
        rows.forEach(row=>{ out += `|-\n| ${row.map(c=>wikiLink(c||'', links)).join(' || ')}\n`; });
        out += `|}\n`;
      }

    } else if (sec.type === 'text') {
      if (sec.content) out += `${wikiLink(sec.content, links)}\n`;
    }
  }

  // Categories
  const cats = (s.categories||[]).filter(c=>c);
  if (cats.length) {
    out += `\n`;
    cats.forEach(c=>{ out += `[[Category:${c}]]\n`; });
  }

  document.getElementById('output-code').textContent = out || '<!-- Fill in the form on the left to generate wiki code here -->';
}

// ═══════════════════════════════════════════════
//  COPY
// ═══════════════════════════════════════════════
function copyCode() {
  const code = document.getElementById('output-code').textContent;
  if (code.startsWith('<!--')) return;
  navigator.clipboard.writeText(code).then(()=>{
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove('copied'); }, 2000);
  });
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
renderForm();
generateOutput();
</script>
